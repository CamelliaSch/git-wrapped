<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Wrapped 2025</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #a463f5;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 50px rgba(164, 99, 245, 0.3);
            color: #e0d0ff;
        }
        h1 {
            color: #ff79c6;
            margin-top: 0;
            font-size: 2.5rem;
            text-align: center;
        }
        .stat {
            margin: 25px 0;
        }
        .label {
            color: #bd93f9;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .value {
            font-size: 2rem;
            font-weight: bold;
            color: #f1fa8c;
        }
        .bar {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 5px 0;
        }
        .bar-filled {
            color: #50fa7b;
        }
        .bar-empty {
            color: #44475a;
        }
        .verdict {
            margin-top: 30px;
            padding: 20px;
            background: #282a36;
            border-radius: 16px;
            font-size: 1.2rem;
            border-left: 5px solid #ff79c6;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #6272a4;
            font-size: 0.9rem;
        }
        .footer a {
            color: #8be9fd;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🦄 Git Wrapped 2025</h1>

    <div class="stat">
        <div class="label">📊 摸鱼指数</div>
        <div class="value">{{.SlackerRatio}}%</div>
        <div class="bar">{{.SlackerBar}}</div>
    </div>

    <div class="stat">
        <div class="label">🌙 夜猫子指数</div>
        <div class="value">{{.NightOwlRatio}}%</div>
        <div class="bar">{{.NightOwlBar}}</div>
    </div>

    <div class="verdict">
        {{.Verdict1}}<br>
        {{.Verdict2}}
    </div>

    <div class="footer">
        Generated by <a href="#">git-wrapped</a> · 100% offline & private
    </div>
</div>
</body>
</html>
