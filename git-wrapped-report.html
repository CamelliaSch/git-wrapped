<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Wrapped 2026</title>
    <style>
         
        :root {
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --text-main: #24292f;
            --text-muted: #57606a;
            --border-color: #d0d7de;
            --bar-bg: #eaeef2;
            --bar-fill-1: #0969da;
            --bar-fill-2: #8250df;
            --verdict-bg: #f3f4f6;
            --verdict-border: #d0d7de;
            --shadow: 0 8px 24px rgba(140, 149, 159, 0.15);
            --hover-glow: 0 0 0 2px rgba(9, 105, 218, 0.2), 0 8px 24px rgba(140, 149, 159, 0.25);
        }

         
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0d1117;
                --card-bg: #161b22;
                --text-main: #c9d1d9;
                --text-muted: #8b949e;
                --border-color: #30363d;
                --bar-bg: #21262d;
                --bar-fill-1: #58a6ff;
                --bar-fill-2: #bc8cff;
                --verdict-bg: #21262d;
                --verdict-border: #8b949e;
                --shadow: 0 8px 24px rgba(1, 4, 9, 0.8);
                --hover-glow: 0 0 0 2px rgba(88, 166, 255, 0.2), 0 8px 24px rgba(0, 0, 0, 0.9);
            }
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(130, 80, 223, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(9, 105, 218, 0.05), transparent 40%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            transition: background-color 0.3s ease;
        }

         
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: var(--shadow);
            box-sizing: border-box;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: box-shadow 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
        }

         
        .card:hover {
            box-shadow: var(--hover-glow);
            border-color: var(--bar-fill-1);
            transform: translateY(-3px);
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            text-align: center;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 40px;
        }

        .stat-group {
            margin-bottom: 30px;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .label {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .value {
            font-size: 1.4rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

         
        .progress-bar {
            width: 100%;
            height: 12px;
            background-color: var(--bar-bg);
            border-radius: 999px;
            overflow: hidden;
        }

        @keyframes fillBar {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

         
        @keyframes pulseGlow {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
            100% { filter: brightness(1); }
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
            transform-origin: left;
            animation: fillBar 1s cubic-bezier(0.22, 1, 0.36, 1) forwards,
                       pulseGlow 1.5s ease-in-out 1;
            animation-delay: 0.3s;
            transform: scaleX(0);
        }

        .fill-blue { background-color: var(--bar-fill-1); }
        .fill-purple { background-color: var(--bar-fill-2); }

        .verdict {
            margin-top: 40px;
            padding: 20px 24px;
            background: var(--verdict-bg);
            border-radius: 12px;
            font-size: 1.05rem;
            line-height: 1.6;
            border-left: 4px solid var(--verdict-border);
            opacity: 0;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.6s;
        }

        .verdict p { margin: 0; }
        .verdict p + p { margin-top: 8px; }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--bar-fill-1);
            text-decoration: none;
            font-weight: 500;
        }
        .footer a:hover { text-decoration: underline; }

         
        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 1.75rem; }
            .label { font-size: 1rem; }
            .value { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📦 Git Wrapped 2026</h1>
        
        <div class="stat-group">
            <div class="stat-header">
                <div class="label">☕ 摸鱼指数</div>
                <div class="value"><span id="slacker-value" data-target="0.0">0.0</span>%</div>
            </div>
            <div class="progress-bar" role="progressbar" aria-valuenow="0.0" aria-valuemin="0" aria-valuemax="100">
                <div class="progress-fill fill-blue" id="slacker-bar" style="width: 0%;" data-target-width="0.0"></div>
            </div>
        </div>

        <div class="stat-group">
            <div class="stat-header">
                <div class="label">🦉 夜猫子指数</div>
                <div class="value"><span id="nightowl-value" data-target="0.0">0.0</span>%</div>
            </div>
            <div class="progress-bar" role="progressbar" aria-valuenow="0.0" aria-valuemin="0" aria-valuemax="100">
                <div class="progress-fill fill-purple" id="nightowl-bar" style="width: 0%;" data-target-width="0.0"></div>
            </div>
        </div>

        <div class="verdict">
            <p>无情的代码机器，卷王本王。</p>
            <p>作息规律，发量惊人。</p>
        </div>

        <div class="footer">
    		Generated by <a href="https://github.com/CamelliaSch/git-wrapped" target="_blank" rel="noopener noreferrer">git-wrapped</a> · 100% Offline & Private
		</div>
    </div>

    <script>
        (function() {
            
            function animateValue(element, start, end, duration) {
                if (end === 0) {
                    element.textContent = '0.0';
                    return;
                }
                const range = end - start;
                const increment = range / (duration / 16);
                let current = start;
                const step = () => {
                    current += increment;
                    if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
                        element.textContent = end.toFixed(1);
                        return;
                    }
                    element.textContent = current.toFixed(1);
                    requestAnimationFrame(step);
                };
                step();
            }

            
            function animateProgressBar(bar, targetWidth) {
                
                
                bar.style.width = targetWidth + '%';
            }

            
            const slackerSpan = document.getElementById('slacker-value');
            const nightOwlSpan = document.getElementById('nightowl-value');
            const slackerBar = document.getElementById('slacker-bar');
            const nightOwlBar = document.getElementById('nightowl-bar');

            const slackerTarget = parseFloat(slackerSpan.dataset.target);
            const nightOwlTarget = parseFloat(nightOwlSpan.dataset.target);

            
            if (!isNaN(slackerTarget)) {
                animateValue(slackerSpan, 0, slackerTarget, 1200);
            }
            if (!isNaN(nightOwlTarget)) {
                animateValue(nightOwlSpan, 0, nightOwlTarget, 1200);
            }

            
            setTimeout(() => {
                if (slackerBar) {
                    slackerBar.style.width = slackerTarget + '%';
                }
                if (nightOwlBar) {
                    nightOwlBar.style.width = nightOwlTarget + '%';
                }
            }, 300);
        })();
    </script>
</body>
</html>
